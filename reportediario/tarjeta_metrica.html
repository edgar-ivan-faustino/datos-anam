<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta Métrica</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      min-width: 180px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-body {
      padding: 20px 24px 16px;
    }

    .delta {
      font-size: 22px;
      font-weight: 600;
      color: #7B2040;
      margin: 0 0 14px;
    }

    .row-val {
      font-size: 14px;
      color: #333333;
      margin: 2px 0 0;
    }

    .row-year {
      font-size: 14px;
      font-weight: 600;
      color: #333333;
      margin: 0 0 10px;
    }

    .card-footer {
      background: #7B2040;
      padding: 10px 24px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-body">
      <p class="delta">-43,868</p>
      <p class="row-val">229,968</p>
      <p class="row-year">2026</p>
      <p class="row-val">273,836</p>
      <p class="row-year">2025</p>
    </div>
    <div class="card-footer">-16.0%</div>
  </div>

</body>
</html>
